name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements_deploy.txt

      - name: Install dependencies
        run: pip install -r requirements_deploy.txt

      - name: Run import smoke test
        run: python -c "from layers import world_model, semantic, causal, motivation, language"

      - name: Run unit tests (no MuJoCo)
        run: pytest tests/test_diagnostics.py -v --tb=short

      - name: Verify Streamlit app syntax
        run: python -m py_compile app.py

  # Streamlit Community Cloud listens for pushes to main and redeploys automatically.
  # This job documents that trigger; no manual deploy step is required.
  notify-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deployment triggered
        run: |
          echo "Tests passed. Streamlit Community Cloud will redeploy automatically."
          echo "Live URL: https://final-project-nsca.streamlit.app"
