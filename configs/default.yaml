# NSCA demo + training wrapper (SPEC / ARCHITECTURE).
# Issue #1: default entry; Issue #6: demo paths.
#
# Training: `python train.py --config configs/default.yaml` resolves to `training_config`.
# Demo: Streamlit reads `demo` and `modules` (see app.py).

training_config: configs/training_config_local.yaml

demo:
  checkpoint_dir: checkpoints
  cognitive_agent_checkpoint: checkpoints/cognitive_agent_full.pth
  world_model_checkpoint: checkpoints/world_model_final.pth

modules:
  use_physics_priors: true
  use_ewc: true
  ewc_lambda: 0.4
  use_llm: false

# Issue #5 — Layer 4: Language Grounding
language_grounding:
  enabled: true
  prop_dim: 9            # must match PropertyLayer output dimension
  embed_dim: 64          # shared concept-percept embedding space
  top_k: 3               # concepts returned per percept query

  # Optional LLM integration (gracefully disabled when api_key is absent)
  llm_integration:
    enabled: false        # set true to enable; requires OPENAI_API_KEY env var
    model: "gpt-3.5-turbo"
    api_key: ""           # leave blank — loaded from OPENAI_API_KEY env var
